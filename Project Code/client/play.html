<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Play Chess</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/play.css">
</head>
<body>
  <header class="page-header">
    <a class="brand" href="/">Chess Arena</a>
    <nav>
      <a href="/play">Play</a>
      <a href="/history">History</a>
      <button id="logoutButton" class="button secondary" type="button">Logout</button>
    </nav>
  </header>

  <main class="play-layout">
    <section class="board-panel">
      <div id="board" class="board" aria-label="Chess board"></div>
    </section>

    <aside class="sidebar-panel">
      <section class="panel">
        <h1>Live Game</h1>
        <p id="statusText">White to move.</p>
        <div class="mode-row">
          <label for="gameMode">Mode</label>
          <select id="gameMode">
            <option value="local">Local two-player</option>
            <option value="ai">Play vs AI</option>
          </select>
        </div>
        <div class="button-row">
          <button id="resetButton" class="button primary" type="button">New Game</button>
          <button id="saveButton" class="button secondary" type="button">Save Game</button>
        </div>
        <p id="savedHint">Completed games can be saved locally and replayed later.</p>
      </section>

      <section class="panel">
        <h2>Move List</h2>
        <ol id="moveList" class="move-list"></ol>
      </section>
    </aside>
  </main>

  <script src="/js/main.js" defer></script>
  <script src="/js/board.js" defer></script>
  <script src="/js/ui.js" defer></script>
  <script src="/js/play.js" defer></script>
</body>
</html>
