<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess Arena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="landing-page">
  <main class="hero-shell">
    <section class="hero-layout">
      <aside class="auth-panel auth-stage" aria-labelledby="auth-title">
        <div class="auth-panel-header">
          <p class="eyebrow">Chess Arena</p>
          <h2 id="auth-title">Login or create your account</h2>
          <p class="auth-panel-copy">A simple, secure entry point to the game. Sign in to continue.</p>
        </div>

        <div class="auth-toggle" role="tablist" aria-label="Account options">
          <button type="button" class="auth-toggle-button is-active" data-auth-mode="login" aria-pressed="true">Login</button>
          <button type="button" class="auth-toggle-button" data-auth-mode="register" aria-pressed="false">Create New Account</button>
        </div>

        <form class="auth-form" id="login-form" novalidate>
          <label class="form-field">
            <span>Email or Username</span>
            <input type="text" name="identifier" autocomplete="username" placeholder="name@example.com" required>
          </label>
          <label class="form-field">
            <span>Password</span>
            <input type="password" name="password" autocomplete="current-password" placeholder="Enter your password" required>
          </label>
          <button class="button primary auth-submit" type="submit">Login</button>
        </form>

        <form class="auth-form is-hidden" id="register-form" novalidate>
          <label class="form-field">
            <span>Username</span>
            <input type="text" name="username" autocomplete="username" placeholder="Choose a username" minlength="3" maxlength="30" required>
          </label>
          <label class="form-field">
            <span>Email</span>
            <input type="email" name="email" autocomplete="email" placeholder="name@example.com" required>
          </label>
          <label class="form-field">
            <span>Password</span>
            <input type="password" name="password" autocomplete="new-password" placeholder="At least 8 characters and 1 special character" minlength="8" required>
          </label>
          <p class="password-hint">Password must be at least 8 characters long and include at least one special character.</p>
          <button class="button primary auth-submit" type="submit">Create Account</button>
        </form>

        <p class="auth-feedback" id="auth-feedback" role="status" aria-live="polite"></p>
        <p class="access-note" id="access-note">Authentication is required before entering the game.</p>
      </aside>
    </section>
  </main>
  <script src="/js/main.js" defer></script>
</body>
</html>
